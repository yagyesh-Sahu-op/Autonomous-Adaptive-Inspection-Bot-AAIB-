
bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_footprint

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 10.0
    transform_tolerance: 1.0
    odom_topic: /odometry/filtered
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.15
      movement_time_allowance: 30.0
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      max_vel_x: 0.2
      desired_linear_vel: 0.15
      desired_angular_vel: 0.3
      min_approach_linear_velocity: 0.05
      use_collision_detection: true
      min_lookahead_dist: 0.25
      max_lookahead_dist: 0.5
      max_vel_y: 0.0
      min_turning_radius: 0.001
      max_vel_theta: 0.5
      rotate_to_heading_angular_vel: 0.35
      min_theta_velocity_threshold: 0.2
      min_vel_theta: 0.3
      min_speed_theta: 0.32
      min_speed_xy: 0.0
      max_speed_xy: 0.5
      acc_lim_x: 0.5
      acc_lim_y: 0.0
      acc_lim_theta: 3.2
      max_angular_accel: 1.5
      decel_lim_x: -2.5
      decel_lim_theta: -3.2
      vx_samples: 20
      vy_samples: 5
      vtheta_samples: 20
      sim_time: 1.7
      critics: ["RotateToGoal", "Oscillation", "ObstacleFootprint", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      RotateToGoal.scale: 64.0
      GoalAlign.scale: 20.0
      PathAlign.scale: 24.0
      PathDist.scale: 12.0
      GoalDist.scale: 16.0
     

amcl:
  ros__parameters:
    use_sim_time: true
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    transform_tolerance: 1.0   # ← add this, handles the startup race
    tf_broadcast: true
    base_frame_id: "base_footprint"
    global_frame_id: "map"
    odom_frame_id: "odom"
    laser_scan_qos: sensor_data
    scan_topic: /scan
    max_particles: 2000
    min_particles: 500
    transform_tolerance: 1.0    # ← increase from default 0.1 to handle sim lag
    laser_max_range: 10.0
    laser_min_range: 0.1
    max_beams: 60 
    set_initial_pose: true
    initial_pose:
      x: 0.0
      y: 0.0  
      yaw: 0.0    

map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: "/home/yagyesh/web_robot_ws/src/robot_description/map/map1.yaml" 


planner_server:
  ros__parameters:
    use_sim_time: true
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"

global_costmap:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    odom_topic: /odometry/filtered
    robot_base_frame: base_footprint
    update_frequency: 1.0
    publish_frequency: 1.0
    always_send_full_costmap: true 
    footprint: "[[0.18,0.15],[0.18,-0.15],[-0.16,-0.15],[-0.16,0.15]]"
    plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
    static_layer:
      plugin: "nav2_costmap_2d::StaticLayer"   # ← add this
      
    obstacle_layer:
      enabled: true
      plugin: "nav2_costmap_2d::ObstacleLayer" # ← add this
      track_unknown_space: true
      observation_sources: scan
      marking: True
      clearing: True
      obstacle_max_range: 3.0
      raytrace_max_range: 3.5
      scan:
        topic: /scan
        max_obstacle_height: 2.0
        clearing: true
        marking: true
        data_type: LaserScan
        
    resolution: 0.05
    inflation_layer:
      enabled: true
      plugin: "nav2_costmap_2d::InflationLayer"
      inflation_radius: 0.5
      cost_scaling_factor: 3.0



local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      update_frequency: 5.0
      publish_frequency: 2.0
      footprint: "[[0.18,0.15],[0.18,-0.15],[-0.16,-0.15],[-0.16,0.15]]"
      
      plugins: ["obstacle_layer", "inflation_layer"]  # NO static_layer!
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 4.5
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.5
        cost_scaling_factor: 3.0
    

velocity_smoother:
  ros__parameters:
    use_sim_time: true   # must be consistent everywhere
    enabled: false
    use_stamped_vel: false

slam_toolbox:
  ros__parameters:
    use_sim_time: true
    base_frame: base_footprint
    odom_frame: odom
    map_frame: map
    mode: mapping
    minimum_range: 0.1
    maximum_range: 10.0
    scan_topic: /scan
    transform_publish_period: 0.1
    tf_buffer_duration: 30.0
    publish_tf: true
    initial_pose:
      x: 0.0
      y: 0.0
      yaw: 0.0
