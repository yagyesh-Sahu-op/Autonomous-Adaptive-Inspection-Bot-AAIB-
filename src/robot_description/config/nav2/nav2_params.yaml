
bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_link

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 10.0
    global_frame: map
    robot_base_frame: base_link
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.15
      movement_time_allowance: 30.0

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"

      min_vel_x: 0.05
      max_vel_x: 0.6
      min_speed_xy: 0.05

      max_vel_theta: 0.8
      min_speed_theta: 0.2

      acc_lim_x: 4.0
      acc_lim_theta: 2.0

      vx_samples: 20
      vtheta_samples: 20
      sim_time: 1.5

      critics:
        - RotateToGoal
        - ObstacleFootprint
        - GoalAlign
        - PathAlign
        - PathDist
        - GoalDist

      RotateToGoal.scale: 1.0
      GoalAlign.scale: 20.0
      PathAlign.scale: 24.0
      PathDist.scale: 12.0
      GoalDist.scale: 16.0
      ObstacleFootprint.scale: 0.01



planner_server:
  ros__parameters:
    use_sim_time: true
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"

global_costmap:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_link
    update_frequency: 1.0
    publish_frequency: 1.0
    footprint: "[[0.20, 0.15], [0.20, -0.15], [-0.20, -0.15], [-0.20, 0.15]]"
    plugins: ["obstacle_layer", "inflation_layer"]
    obstacle_layer:
      enabled: true
      track_unknown_space: true
      observation_sources: scan
      scan:
        topic: /scan_laser
        max_obstacle_height: 2.0
        clearing: true
        marking: true
        data_type: LaserScan
        
    resolution: 0.05
    inflation_layer:
      enabled: true
      inflation_radius: 0.35
      cost_scaling_factor: 3.0



local_costmap:
  ros__parameters:
    global_frame: odom
    robot_base_frame: base_link
    update_frequency: 5.0
    publish_frequency: 5.0
    rolling_window: true
    resolution: 0.07
    width: 4
    height: 4
    footprint: "[[0.20, 0.15], [0.20, -0.15], [-0.20, -0.15], [-0.20, 0.15]]"
    plugins: ["obstacle_layer", "inflation_layer"]
    obstacle_layer:
      enabled: true
      
      observation_sources: scan
      scan:
        topic: /scan_laser
        max_obstacle_height: 2.0
        clearing: true
        marking: true
        data_type: LaserScan
    

velocity_smoother:
  ros__parameters:
    enabled: false
    use_stamped_vel: false

slam_toolbox:
  ros__parameters:
    use_sim_time: true
    base_frame: base_link
    odom_frame: odom
    map_frame: map
    mode: mapping
    minimum_range: 0.1
    scan_topic: /scan_laser
    transform_publish_period: 0.1
    tf_buffer_duration: 30.0
    publish_tf: true
    initial_pose:
      x: 0.0
      y: 0.0
      yaw: 0.0
